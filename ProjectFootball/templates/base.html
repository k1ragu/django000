<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --blur: 15px;
        }

        body {
            /* Replace with a cool football stadium or abstract sports image */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 2rem;
            margin-top: 50px;
        }

        .navbar-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- Glass Navbar -->
    <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container">
            {% load static %}
            <img src="{% static 'svgs\shoe_cleats_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg' %}" alt="" srcset="">
            <a class="navbar-brand fw-bold text-white " href="{% url 'home' %}">Sports By Kiragu</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
                <a class="nav-link" href="{% url 'team' %}">Teams</a>
                <a class="nav-link" href="{% url 'about' %}">About</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 glass-card">
                {% block content %}
                <!-- This is where your home.html content will appear -->
                {% endblock %}
            </div>
        </div>
    </div>






<!-- Combined Glassmorphic Footer -->
<footer class="footer-glass mt-auto py-5">
    <div class="container">
        <div class="row align-items-center text-center text-md-start">
            
            <!-- Column 1: Brand -->
            <div class="col-md-4 mb-4 mb-md-0">
                <img src="{% static 'svgs\shoe_cleats_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg' %}" alt="" srcset="">
                <h5 class="fw-bold text-white mb-1 tracking-wider">SPORTS BY KIRAGU</h5>
                <p class="small mb-0 opacity-50">Empowering team management with modern tech.</p>
                <div class="mt-2 small opacity-75">© 2026 Sports Management System</div>
            </div>

            <!-- Column 2: Symmetrical Links -->
            <div class="col-md-4 mb-4 mb-md-0 text-center">
                <div class="d-flex justify-content-center gap-4">
                    <a href="{% url 'home' %}" class="footer-link">Dashboard</a>
                    <a href="{% url 'team' %}" class="footer-link">Teams</a>
                    <a href="{% url 'about' %}" class="footer-link">Support</a>
                </div>
            </div>

            <!-- Column 3: Social Icons & Status -->
            <div class="col-md-4 text-md-end text-center">
                <div class="d-flex justify-content-md-end justify-content-center gap-3">
                    <a href="#" class="social-icon">⚡</a>
                    <a href="#" class="social-icon">🐦</a>
                    <a href="#" class="social-icon">📧</a>
                </div>
            </div>

        </div>
    </div>

    <style>
        /* Footer Specific Glassmorphism */
        .footer-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            margin-top: 80px;
        }

        .footer-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer-link:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .tracking-wider { letter-spacing: 2px; }

        /* Fix to keep footer at bottom of viewport if content is short */
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
        }
    </style>
</footer>




    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
